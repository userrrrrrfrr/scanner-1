<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>QR Scanner</title>
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}
video {
  width: 300px;
  margin-top: 20px;
  border: 2px solid white;
}
#result {
  margin-top: 20px;
  font-size: 24px;
}
</style>
</head>
<body>

<h1>סורק QR מיוחד</h1>

<video id="video" autoplay></video>
<div id="result">ממתין לסריקה...</div>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>
const video = document.getElementById("video");
const result = document.getElementById("result");

// מפעיל מצלמה
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
    video.srcObject = stream;
});

// יצירת canvas נסתר
const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

function scan() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

        const code = jsQR(imageData.data, canvas.width, canvas.height);

        if (code) {
            handleQR(code.data);
        }
    }
    requestAnimationFrame(scan);
}

// כאן אתה קובע מה כל QR עושה
function handleQR(data) {

    result.innerText = "נסרק: " + data;

    // דוגמה ללוגיקה שלך:
    if (data === "https://www.acerparts.ca/acer-part-finder/?utm_term=&utm_campaign=Performance+Max+US&utm_source=adwords&utm_medium=ppc&hsa_acc=1137936781&hsa_cam=21402064921&hsa_grp=&hsa_ad=&hsa_src=x&hsa_tgt=&hsa_kw=&hsa_mt=&hsa_net=adwords&hsa_ver=3&gad_source=1&gad_campaignid=21402065467&gbraid=0AAAAADmuEP4zyF7Jz_ezlLrGEkh175evx&gclid=Cj0KCQjw0JnRBhDJARIsALobnXZEPjhguJuSNSp4pmnSFvq_y7bLvlpSkDbHg66vApZuzMMjFcGKnkoaAjOuEALw_wcB") {
        result.innerText = "128328892032984392388422928492938292904919481949";
    }
    else if (data === "B2") {
        result.innerText = "219384729475928528482938492342";
    }
    else if (data === "YOUTUBE") {
        window.location.href = "3029384829482938392943002948292848918482994829193";
    }
}

scan();
</script>

</body>
</html>
