<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>QR Scanner</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 0;
  background: #000;
  color: white;
  overflow: hidden;
}

h1 {
  position: absolute;
  top: 10px;
  width: 100%;
  text-align: center;
  font-size: 18px;
  z-index: 2;
}

video {
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

#result {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.75);
  padding: 15px;
  font-size: 18px;
  word-break: break-word;
  z-index: 2;
}
</style>

</head>

<body>

<h1>סורק QR מיוחד</h1>

<video id="video" autoplay playsinline></video>
<div id="result">טוען מצלמה...</div>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>
const video = document.getElementById("video");
const result = document.getElementById("result");

let scanned = false;

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video.srcObject = stream;
        result.innerText = "מצלמה פועלת - ממתין לסריקה";
        scan();

    } catch (err) {
        result.innerText = "❌ אין גישה למצלמה";
        console.error(err);
    }
}

function scan() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);

        if (code && !scanned) {
            handleQR(code.data);
        }
    }

    requestAnimationFrame(scan);
}

function handleQR(data) {

    scanned = true;

    result.innerText = "נסרק: " + data;

    if (data === "https://www.acerparts.ca/") {
        result.innerText = "128328892032984392388422928492938292904919481949";
    }

    else if (data === "https://maoz.org.il/%D7%92%D7%93%D7%A9/") {
        result.innerText = "219384729475928528482938492342";
    }

    else if (data.includes("ddgroup.com")) {
        result.innerText = "3029384829482938392943002948292848918482994829193";
    }

    else {
        result.innerText = "QR לא מוכר";
    }
}

startCamera();
</script>

</body>
</html>
