<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>QR Scanner</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}
video {
  width: 300px;
  margin-top: 20px;
  border: 2px solid white;
}
#result {
  margin-top: 20px;
  font-size: 22px;
  word-break: break-word;
}
</style>
</head>
<body>

<h1>סורק QR מיוחד</h1>

<video id="video" autoplay></video>
<div id="result">ממתין לסריקה...</div>

<script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

<script>
const video = document.getElementById("video");
const result = document.getElementById("result");

let scanned = false;

// מצלמה
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
    video.srcObject = stream;
});

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

function scan() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, canvas.width, canvas.height);

        if (code && !scanned) {
            handleQR(code.data);
        }
    }

    requestAnimationFrame(scan);
}

function handleQR(data) {

    scanned = true;

    result.innerText = "נסרק: " + data;

    if (data === "https://www.acerparts.ca/") {
        result.innerText = "128328892032984392388422928492938292904919481949";
    }

    else if (data === "https://www.w3schools.com/dsa/") {
        result.innerText = "219384729475928528482938492342";
    }

    else if (data === "https://www.energy.gov/") {
        result.innerText = "3029384829482938392943002948292848918482994829193";
    }

    else {
        result.innerText = "QR לא מוכר";
    }
}

scan();
</script>

</body>
</html>
